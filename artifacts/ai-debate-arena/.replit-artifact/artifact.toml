kind = "web"
previewPath = "/"
title = "AI Debate Arena"
version = "1.0.0"
id = "artifacts/ai-debate-arena"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23883

[services.development]
run = "pnpm --filter @workspace/ai-debate-arena run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ai-debate-arena", "run", "build" ]
publicDir = "artifacts/ai-debate-arena/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23883"
BASE_PATH = "/"
